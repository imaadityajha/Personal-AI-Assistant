services:
  - type: web
    name: personal-ai-assistant-api
    env: node
    rootDir: server
    buildCommand: npm install
    startCommand: npm run start
    plan: free
    healthCheckPath: /api/v1/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: FRONTEND_URL
        sync: false
      - key: FRONTEND_URLS
        sync: false
      - key: ALLOW_ALL_ORIGINS
        value: "false"
      - key: MONGODB_URL
        sync: false
      - key: ACCESS_TOKEN_SECRET
        sync: false
      - key: REFRESH_TOKEN_SECRET
        sync: false
      - key: AI_API_URL
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: AI_MODEL
        value: llama-3.3-70b-versatile
      - key: YOUTUBE_API_KEY
        sync: false
      - key: MAIL_ID
        sync: false
      - key: MAIL_PASSWORD
        sync: false
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: SUPPORT_EMAIL
        sync: false
      - key: ADMIN_EMAIL
        sync: false

  - type: web
    name: personal-ai-assistant-web
    env: static
    rootDir: client
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
